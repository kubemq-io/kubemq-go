# .github/workflows/release.yml
# Owned by: 11-packaging-spec.md (REQ-PKG-3)
# Automated release pipeline for KubeMQ Go SDK v2

name: Release

on:
  push:
    tags:
      - 'v2.*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate version.go matches tag
        run: |
          file_version=$(awk -F'"' '/const Version/ {print $2}' version.go)
          if [ "$file_version" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::version.go ($file_version) does not match tag (${{ steps.tag.outputs.version }})"
            exit 1
          fi

      - name: Validate CHANGELOG entry exists
        run: |
          tag_version="${{ steps.tag.outputs.version }}"
          if ! grep -qF "## [$tag_version]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no entry for version $tag_version"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        go-version: ['1.23', '1.24']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Run vet
        run: go vet ./...

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          # Extract the section for this version (between this version header and the next)
          awk -v ver="$tag_version" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
